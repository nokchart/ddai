<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>녹차트 채팅 분석</title>
    <link rel="icon" href="emoticon/ndokDigj.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1e1e2e; color: #cdd6f4; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 1400px; margin: 0 auto; background: #181825; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); width: 100%; }
        h1, h2 { color: #a6e3a1; text-align: center; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 40px; display: none; }
        .chart-box { background: #313244; padding: 20px; border-radius: 12px; height: 50vh; position: relative; width: 100%; }
        .v-timeline-section { background: #313244; padding: 20px; border-radius: 12px; position: relative; margin-top: 20px; width: 100%; }

        /* 엑셀 저장 버튼 스타일 */
        .export-btn { position: absolute; top: 15px; right: 20px; background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; z-index: 10; }
        .export-btn:hover { transform: scale(1.15); }
        .export-btn svg { width: 26px; height: 26px; fill: #a6e3a1; opacity: 0.7; transition: opacity 0.2s; }
        .export-btn:hover svg { opacity: 1; }

        #hourButtonContainer { display: none; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; padding-bottom: 8px; }
        ::-webkit-scrollbar { width: 10px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e2e; border-radius: 5px; }
        ::-webkit-scrollbar-thumb { background: #6c7086; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #89b4fa; }

        .hour-btn { background-color: #45475a; color: #cdd6f4; border: 1px solid #6c7086; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-family: inherit; font-size: 14px; transition: all 0.2s; }
        .hour-btn.active { background-color: #89b4fa; color: #11111b; font-weight: bold; border-color: #89b4fa; }

        #scrollTopBtn { position: fixed; bottom: 30px; right: 30px; background-color: #89b4fa; color: #11111b; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 9999; transition: transform 0.2s, background-color 0.2s; }
        #scrollTopBtn:hover { transform: scale(1.1); background-color: #b4befe; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 15px; border-radius: 8px; }
            h1 { font-size: 20px; margin-top: 10px;}
            h2 { font-size: 16px; margin-top: 5px;}
            .dashboard-grid { gap: 20px; }
            .chart-box { padding: 10px; height: 40vh; }
            .v-timeline-section { padding: 10px; margin-top: 10px; }
            .export-btn { top: 10px; right: 10px; }
            .export-btn svg { width: 22px; height: 22px; }
            #hourButtonContainer { display: grid !important; grid-template-columns: repeat(5, 1fr); gap: 5px; justify-content: center; }
            .hour-btn { padding: 6px 0; font-size: 11px; text-align: center; word-break: keep-all; }
            #scrollTopBtn { bottom: 20px; right: 20px; width: 45px; height: 45px; font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" style="color: #89b4fa; text-decoration: none; font-size: 16px;">◀ 달력으로 돌아가기</a>
    <h1 id="dashboardTitle">📈 치지직 시계열 통합 대시보드</h1>
    <div id="loadingMsg" style="text-align: center; padding: 50px; font-size: 18px;">데이터를 불러오는 중입니다... ⏳</div>
    <div class="dashboard-grid" id="dashboard">
        
        <div class="chart-box">
            <button class="export-btn" onclick="exportToCSV('chat')" title="전체 채팅 엑셀 저장">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm-1 14.5l-2.5-3 2.5-3h1.5l-1.8 2.2L14.5 17h-1.5zm-3 0l-1.5-2.2L6.7 17H5.2l2.5-3-2.5-3h1.5l1.5 2.2L9.7 11h1.5l-2.5 3 2.5 3H11zM13 9V3.5L18.5 9H13z"/></svg>
            </button>
            <canvas id="totalChatChart"></canvas>
        </div>

        <div class="chart-box">
            <button class="export-btn" onclick="exportToCSV('viewer')" title="시청자 수 엑셀 저장">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm-1 14.5l-2.5-3 2.5-3h1.5l-1.8 2.2L14.5 17h-1.5zm-3 0l-1.5-2.2L6.7 17H5.2l2.5-3-2.5-3h1.5l1.5 2.2L9.7 11h1.5l-2.5 3 2.5 3H11zM13 9V3.5L18.5 9H13z"/></svg>
            </button>
            <canvas id="userViewerChart"></canvas>
        </div>

        <div class="v-timeline-section" id="highlightSection">
            <button class="export-btn" onclick="exportToCSV('highlight')" title="하이라이트 엑셀 저장">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm-1 14.5l-2.5-3 2.5-3h1.5l-1.8 2.2L14.5 17h-1.5zm-3 0l-1.5-2.2L6.7 17H5.2l2.5-3-2.5-3h1.5l1.5 2.2L9.7 11h1.5l-2.5 3 2.5 3H11zM13 9V3.5L18.5 9H13z"/></svg>
            </button>
            <h2 style="text-align:center; color: #f38ba8; margin-top: 0;">하이라이트 채팅</h2>
            <div id="hourButtonContainer"></div>
            <div id="vTimelineWrapper" style="position: relative; width: 100%; overflow: hidden;">
                <canvas id="vTimelineChart"></canvas>
                <div id="vTimelineOverlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></div>
            </div>
        </div>
    </div>
</div>

<button id="scrollTopBtn" title="위로 가기">⬆</button>

<script>
    let chatChartInstance = null;
    let userChartInstance = null;
    let vTimelineChartInstance = null;
    let currentChunkIndex = 0; 
    let globalExportData = null; 
    
    const isMobile = window.innerWidth <= 768;

    function getActualTimeOnly(elapsedSec, initTimeString) {
        if (!initTimeString) return "(00:00)";
        const parts = initTimeString.split(':');
        const initH = parseInt(parts[0], 10) || 0;
        const initM = parseInt(parts[1], 10) || 0;
        const initS = parts.length === 3 ? (parseInt(parts[2], 10) || 0) : 0;
        const totalSec = (initH * 3600) + (initM * 60) + initS + elapsedSec;
        const aH = String(Math.floor(totalSec / 3600) % 24).padStart(2, '0');
        const aM = String(Math.floor((totalSec % 3600) / 60)).padStart(2, '0');
        return `(${aH}:${aM})`;
    }

    function getClosestIndex(secArray, targetSec) {
        let minDiff = Infinity;
        let closest = 0;
        for(let i = 0; i < secArray.length; i++) {
            let diff = Math.abs(secArray[i] - targetSec);
            if(diff < minDiff) { minDiff = diff; closest = i; }
        }
        return closest;
    }

    function getGradientColor(value, max, alpha = 1) {
        let ratio = max > 0 ? Math.max(0, Math.min(1, value / max)) : 0;
        let r, g, b;
        if (ratio < 0.5) {
            let pct = ratio * 2;
            r = Math.round(137 + (166 - 137) * pct);
            g = Math.round(180 + (227 - 180) * pct);
            b = Math.round(250 + (161 - 250) * pct);
        } else {
            let pct = (ratio - 0.5) * 2;
            r = Math.round(166 + (243 - 166) * pct);
            g = Math.round(227 + (139 - 227) * pct);
            b = Math.round(161 + (168 - 161) * pct);
        }
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function fillMissingData(originalData) {
        if (!originalData || !originalData.x || originalData.x.length === 0) return originalData;
        const interval = 10;
        const newX = [], newYmean = [], newYk = [], newYq = [], newYwt = [], newYzi = [], newYee = [], newUser = [];

// 1. [추가] 0초부터 첫 데이터 시작점까지 빈 구간 채우기

    let fillX = 0;
    const firstActualX = Number(originalData.x[0]);
    
    while (fillX < firstActualX) {
        newX.push(fillX);
        newYmean.push(0);
        newYk.push(0);
        newYq.push(0);
        newYwt.push(0);
        newYzi.push(0);
        newYee.push(0);
        newUser.push(0); 
        fillX += interval;
    }
        for (let i = 0; i < originalData.x.length; i++) {
            const currentX = Number(originalData.x[i]); 
            
            newX.push(currentX);
            newYmean.push(originalData.ymean[i]);
            newYk.push(originalData.yk[i]);
            newYq.push(originalData.yq[i]);
            newYwt.push(originalData.ywt[i]);
            newYzi.push(originalData.yzi[i]);
            newYee.push(originalData.yee[i]);
            newUser.push(originalData.user[i]);

            if (i < originalData.x.length - 1) {
                const nextX = Number(originalData.x[i + 1]);
                let expectedNextX = currentX + interval;

                while (expectedNextX < nextX) {
                    newX.push(expectedNextX);
                    newYmean.push(originalData.ymean[i]); 
                    newYk.push(originalData.yk[i]);
                    newYq.push(originalData.yq[i]);
                    newYwt.push(originalData.ywt[i]);
                    newYzi.push(originalData.yzi[i]);
                    newYee.push(originalData.yee[i]);
                    newUser.push(originalData.user[i]); 
                    expectedNextX += interval;
                }
            }
        }
        return { x: newX, ymean: newYmean, yk: newYk, yq: newYq, ywt: newYwt, yzi: newYzi, yee: newYee, user: newUser };
    }

    const urlParams = new URLSearchParams(window.location.search);
    const targetFile = urlParams.get('file');

    if (!targetFile) {
        alert("선택된 파일이 없습니다. 달력 페이지로 돌아갑니다.");
        window.location.href = "index.html";
    } else {
        document.getElementById('dashboardTitle').innerText = `녹차트 ${targetFile.replace('.json', '')} 방송`;
        fetch('json/' + targetFile)
            .then(response => {
                if (!response.ok) throw new Error("파일을 찾을 수 없습니다.");
                return response.json();
            })
            .then(data => {
                document.getElementById('loadingMsg').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';
                renderDashboard(data); 
            })
            .catch(error => {
                alert("데이터를 불러오는 데 실패했습니다: " + error.message);
            });
    }

    function exportToCSV(type) {
        if (!globalExportData) {
            alert('아직 데이터가 준비되지 않았습니다.');
            return;
        }

        const datadic = globalExportData.datadic;
        const raw = globalExportData.raw;
        const initTime = raw.initiationtime;
        
        let csvContent = "\uFEFF"; 
        let filename = "";
        const filePrefix = targetFile.replace('.json', '');

        if (type === 'chat') {
            filename = `전체채팅_${filePrefix}.csv`;
            csvContent += "경과시간(초),실제시간,전체채팅,ㅋㅋ,?,ㅈㅅ,캬,ㄷㄷ/헉\n";
            for (let i = 0; i < datadic.x.length; i++) {
                const sec = datadic.x[i];
                const realTime = getActualTimeOnly(sec, initTime).replace(/[()]/g, '');
                csvContent += `${sec},${realTime},${datadic.ymean[i]},${datadic.yk[i]},${datadic.yq[i]},${datadic.ywt[i]},${datadic.yzi[i]},${datadic.yee[i]}\n`;
            }
        } else if (type === 'viewer') {
            filename = `시청자수_${filePrefix}.csv`;
            csvContent += "경과시간(초),실제시간,시청자수\n";
            for (let i = 0; i < datadic.x.length; i++) {
                const sec = datadic.x[i];
                const realTime = getActualTimeOnly(sec, initTime).replace(/[()]/g, '');
                csvContent += `${sec},${realTime},${datadic.user[i]}\n`;
            }
        } else if (type === 'highlight') {
            filename = `하이라이트_${filePrefix}.csv`;
            csvContent += "시작시간(초),종료시간(초),피크점수,실제시간,채팅내용\n";
            
            const chatKeys = Object.keys(raw.textdic);
            chatKeys.sort((a, b) => parseFloat(a.split('\t')[0]) - parseFloat(b.split('\t')[0]));
            
            chatKeys.forEach(key => {
                const parts = key.split('\t');
                const startSec = parseFloat(parts[0]);
                const endSec = parseFloat(parts[1]);
                const peak = parseFloat(parts[2]);
                const realTime = getActualTimeOnly(Math.round((startSec + endSec) / 2), initTime).replace(/[()]/g, '');

                const rawChats = raw.textdic[key].split('\t');
                if (rawChats.length > 0 && rawChats[rawChats.length - 1] === '') rawChats.pop();
                
                const emoticonData = raw.emotdic ? raw.emotdic[key] : null; 
                
                // 🌟 이모티콘 텍스트화 로직 적용
const formattedChats = rawChats.map((chatText, i) => {
    const lineKey = String(i + 1); 
    if (emoticonData && emoticonData[lineKey]) {
        let resultText = chatText; // 원본 텍스트(5칸 공백 포함)에서 시작
        emoticonData[lineKey].flat(Infinity).forEach(item => {
            if (typeof item === 'string' && item.trim() !== '') { 
                // 앞에서부터 순차적으로 5칸 공백('     ')을 찾아서 [이모티콘]으로 쏙 교체
                resultText = resultText.replace('     ', `[${item}]`); 
            }
        });
        return resultText;
    } 
    return chatText;
});
                
                let cleanText = formattedChats.join(' / ').replace(/"/g, '""');
                csvContent += `${startSec},${endSec},${peak},${realTime},"${cleanText}"\n`;
            });
        }

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", filename);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function renderDashboard(data) {
        const datadic = fillMissingData(data.datadic);
        const initTime = data.initiationtime;
        
        globalExportData = { datadic: datadic, raw: data };

        Chart.defaults.font.family = "'Malgun Gothic', sans-serif";
        Chart.defaults.color = '#cdd6f4';
        Chart.defaults.borderColor = '#45475a';
        const defaultFontSize = isMobile ? 10 : 12;

        const maxTimeSec = datadic.x[datadic.x.length - 1];
        const totalHours = Math.ceil(maxTimeSec / 3600);
        const chunkSize = isMobile ? 3 : (totalHours > 10 ? 10 : totalHours);
        const totalChunks = Math.ceil(totalHours / chunkSize);

        function selectChunk(chunkIndex) {
            currentChunkIndex = chunkIndex;
            const hourBtnContainer = document.getElementById('hourButtonContainer');
            
            if (totalChunks > 1) {
                hourBtnContainer.style.display = isMobile ? 'grid' : 'flex';
                document.querySelectorAll('.hour-btn').forEach(btn => {
                    const isMatch = parseInt(btn.dataset.chunk) === chunkIndex;
                    btn.classList.toggle('active', isMatch);
                });
            } else {
                hourBtnContainer.style.display = 'none';
            }

            const startSec = chunkIndex * chunkSize * 3600;
            const endSec = (chunkIndex + 1) * chunkSize * 3600;

            const startIdx = getClosestIndex(datadic.x, startSec);
            let endIdx = getClosestIndex(datadic.x, endSec);
            if (datadic.x[endIdx] > endSec && endIdx > 0) endIdx--;
            
            const rowHeight = isMobile ? 5 : 10;
            const minHeightPerMin = isMobile ? 20 : 55;
            const numItems = Math.max(endIdx - startIdx, 1);
            const minuteSpan = Math.ceil((datadic.x[endIdx] - datadic.x[startIdx]) / 60) || 1;

            const calculatedHeight = Math.max(numItems * rowHeight, minuteSpan * minHeightPerMin);
            const safeHeight = isMobile ? Math.max(400, calculatedHeight) : Math.min(Math.max(600, calculatedHeight), 32000); 
            document.getElementById('vTimelineWrapper').style.height = safeHeight + 'px';

if (vTimelineChartInstance) {
        vTimelineChartInstance.options.scales.y.min = datadic.x[startIdx];
        vTimelineChartInstance.options.scales.y.max = datadic.x[endIdx];
        vTimelineChartInstance.update();
    }
        }

        const customTooltip = {
            mode: 'index',
            intersect: false,
            callbacks: {
                title: function(tooltipItems) {
                    const sec = Math.round(datadic.x[tooltipItems[0].dataIndex]);
                    const h = String(Math.floor(sec / 3600)).padStart(2, '0');
                    const m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
                    return `경과시간 ${h}:${m} ` + getActualTimeOnly(sec, initTime);
                }
            }
        };

        const hourScales = {
            x: {
                type: 'category', 
                ticks: {
                    autoSkip: false, maxRotation: 0,
                    callback: function(value, index) {
                        const sec = Math.round(datadic.x[value]);
                        if (value === 0 || (sec > 0 && sec % 3600 === 0)) {
                            const calcSec = value === 0 ? 0 : sec;
                            const h = String(Math.floor(calcSec / 3600)).padStart(2, '0');
                            const m = String(Math.floor((calcSec % 3600) / 60)).padStart(2, '0');
                            return [`${h}:${m}`, getActualTimeOnly(calcSec, initTime)];
                        }
                        return null;
                    },
                    font: { size: defaultFontSize }, color: '#a6adc8'
                },
                grid: {
                    color: function(context) {
                        if (context.tick && context.tick.value !== undefined) {
                            const sec = Math.round(datadic.x[context.tick.value]);
                            if (context.tick.value === 0 || (sec > 0 && sec % 3600 === 0)) return 'rgba(108, 112, 134, 0.5)';
                        }
                        return 'transparent';
                    }
                }
            },
            y: { beginAtZero: true, grid: { color: 'rgba(108, 112, 134, 0.1)' } }
        };

        const metaAnnotations = {};
        let annCount = 0;
        Object.keys(data.tidic).forEach(key => {
            const times = key.split('\t');
            const closestIndex = getClosestIndex(datadic.x, parseFloat(times[0]));
            const labelText = isMobile ? data.tidic[key] : `[${data.cadic[key] || '카테고리 없음'}] ${data.tidic[key]}`;

            metaAnnotations['line' + annCount] = { type: 'line', xMin: closestIndex, xMax: closestIndex, borderColor: 'rgba(166, 227, 161, 0.7)', borderWidth: 2, borderDash: [5, 5] };
            metaAnnotations['titleLabel' + annCount] = { type: 'label', xValue: closestIndex, yValue: (ctx) => ctx.chart?.scales?.y?.max || 0, content: labelText, position: { x: 'start', y: 'start' }, backgroundColor: 'rgba(24, 24, 37, 0.9)', color: '#a6e3a1', font: { size: defaultFontSize, family: "'Malgun Gothic', sans-serif" }, padding: isMobile ? 4 : 6, xAdjust: 4, yAdjust: (annCount % 3) * (isMobile ? 20 : 30) + 10 };
            annCount++;
        });

        const handleTopChartClick = (e, activeElements) => {
            if (activeElements.length > 0) {
                const dataIndex = activeElements[0].index;
                const targetSec = datadic.x[dataIndex];
                const targetChunk = Math.floor(Math.floor(targetSec / 3600) / chunkSize);
                
                if (currentChunkIndex !== targetChunk) selectChunk(targetChunk);
                
                setTimeout(() => {
                    if (vTimelineChartInstance) {
                        const yPixel = vTimelineChartInstance.scales.y.getPixelForValue(dataIndex);
                        const targetScrollY = document.getElementById('vTimelineWrapper').getBoundingClientRect().top + window.scrollY + yPixel - (window.innerHeight / 3);
                        window.scrollTo({ top: Math.max(0, targetScrollY), behavior: 'smooth' });
                    }
                }, 150);
            }
        };

        if (chatChartInstance) chatChartInstance.destroy();
        chatChartInstance = new Chart(document.getElementById('totalChatChart'), {
            type: 'line',
            data: { labels: datadic.x, datasets: [{ label: '전체', data: datadic.ymean, borderColor: '#cba6f7', borderWidth: isMobile ? 1.5 : 2, tension: 0.2, pointRadius: 0 }, { label: 'ㅋㅋ', data: datadic.yk, borderColor: '#89b4fa', borderWidth: 1.5, tension: 0.2, pointRadius: 0 }, { label: '?', data: datadic.yq, borderColor: '#f38ba8', borderWidth: 1.5, tension: 0.2, pointRadius: 0 }, { label: 'ㅈㅅ', data: datadic.ywt, borderColor: '#a6e3a1', borderWidth: 1.5, tension: 0.2, pointRadius: 0 }, { label: '캬', data: datadic.yzi, borderColor: '#94e2d5', borderWidth: 1.5, tension: 0.2, pointRadius: 0 }, { label: 'ㄷㄷ/헉', data: datadic.yee, borderColor: '#fab387', borderWidth: 1.5, tension: 0.2, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: '전체 채팅', font: { size: isMobile ? 14 : 18 } }, annotation: { annotations: metaAnnotations }, tooltip: customTooltip, legend: { labels: { font: { size: defaultFontSize } } } }, interaction: { mode: 'index', intersect: false }, scales: hourScales, onClick: handleTopChartClick }
        });

        if (userChartInstance) userChartInstance.destroy();
        userChartInstance = new Chart(document.getElementById('userViewerChart'), {
            type: 'line',
            data: { labels: datadic.x, datasets: [{ label: '평균 시청자 수', data: datadic.user, borderColor: '#f9e2af', backgroundColor: 'rgba(249, 226, 175, 0.2)', fill: true, borderWidth: isMobile ? 1.5 : 2, tension: 0.3, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: '시청자 수', font: { size: isMobile ? 14 : 18 } }, annotation: { annotations: metaAnnotations }, tooltip: customTooltip, legend: { labels: { font: { size: defaultFontSize } } } }, interaction: { mode: 'index', intersect: false }, scales: hourScales, onClick: handleTopChartClick }
        });

        const highlightAnnotations = {};
        let maxGlobalPeak = 0;
        const chatKeys = Object.keys(data.textdic);
        chatKeys.forEach(key => {
            const peak = parseFloat(key.split('\t')[2]);
            if (peak > maxGlobalPeak) maxGlobalPeak = peak;
        });
        chatKeys.sort((a, b) => parseFloat(a.split('\t')[0]) - parseFloat(b.split('\t')[0]));

        chatKeys.forEach((key, idx) => {
            const parts = key.split('\t');
            const startIdx = getClosestIndex(datadic.x, parseFloat(parts[0]));
            const endIdx = getClosestIndex(datadic.x, parseFloat(parts[1]));
            highlightAnnotations['box' + idx] = { type: 'box', yMin: startIdx, yMax: endIdx, backgroundColor: getGradientColor(Math.round(parseFloat(parts[2])), maxGlobalPeak, 0.15), borderWidth: 0 };
        });

        const htmlTextOverlayPlugin = {
            id: 'htmlTextOverlay',
            afterDraw: (chart) => {
                const overlay = document.getElementById('vTimelineOverlay');
                overlay.innerHTML = ''; 
                const yMinIdx = chart.scales.y.min !== undefined ? chart.scales.y.min : 0;
                const yMaxIdx = chart.scales.y.max !== undefined ? chart.scales.y.max : datadic.x.length - 1;

                chatKeys.forEach((key) => {
                    const parts = key.split('\t');
                    const startIdx = getClosestIndex(datadic.x, parseFloat(parts[0]));
                    const endIdx = getClosestIndex(datadic.x, parseFloat(parts[1]));
                    if (endIdx < yMinIdx || startIdx > yMaxIdx) return;

                    const peakScore = Math.round(parseFloat(parts[2]));
                    const rawChats = data.textdic[key].split('\t');
                    if (rawChats.length > 0 && rawChats[rawChats.length - 1] === '') rawChats.pop();
                    
                    const textColor = getGradientColor(peakScore, maxGlobalPeak, 1.0);
                    const yValue = (startIdx + endIdx) / 2;
                    const xPixel = chart.scales.x.getPixelForValue(peakScore);
                    const yPixel = chart.scales.y.getPixelForValue(yValue);
                    const emoticonData = data.emotdic ? data.emotdic[key] : null; 
                    
const formattedChats = rawChats.map((chatText, i) => {
    const lineKey = String(i + 1); 
    if (emoticonData && emoticonData[lineKey]) {
        let resultHtml = chatText; 
        emoticonData[lineKey].flat(Infinity).forEach(item => {
            if (typeof item === 'string' && item.trim() !== '') { 
                // 순서대로 나타나는 공백 5칸을 이모티콘 이미지로 쏙! 교체
                resultHtml = resultHtml.replace('     ', `<img src="emoticon/${item}" style="height: 1.4em; vertical-align: middle; margin: 0 2px;">`); 
            }
        });
        return resultHtml;
    } 
    return chatText;
});

                    const textContainer = document.createElement('div');
                    textContainer.style.position = 'absolute'; textContainer.style.left = (xPixel + (isMobile ? 4 : 8)) + 'px'; textContainer.style.top = yPixel + 'px'; textContainer.style.transform = 'translateY(-50%)';
                    textContainer.style.color = textColor; textContainer.style.fontFamily = "'Malgun Gothic', sans-serif"; textContainer.style.fontSize = (isMobile ? '10px' : '12px'); textContainer.style.fontWeight = 'bold'; textContainer.style.lineHeight = '1.3'; textContainer.style.pointerEvents = 'none'; textContainer.style.whiteSpace = 'nowrap';
                    textContainer.innerHTML = formattedChats.join('<br>');
                    overlay.appendChild(textContainer);
                });
            }
        };

        if (vTimelineChartInstance) vTimelineChartInstance.destroy();
        vTimelineChartInstance = new Chart(document.getElementById('vTimelineChart'), {
            type: 'line',
            data: { labels: datadic.x, datasets: [{ label: '전체', data: datadic.ymean, borderColor: '#cba6f7', backgroundColor: 'rgba(203, 166, 247, 0.1)', borderWidth: isMobile ? 1.5 : 2, fill: true, tension: 0.2, pointRadius: 0 }, { label: 'ㅋㅋ', data: datadic.yk, borderColor: '#89b4fa', borderWidth: 1.5, tension: 0.2, pointRadius: 0 }, { label: '?', data: datadic.yq, borderColor: '#f38ba8', borderWidth: 1.5, tension: 0.2, pointRadius: 0 }, { label: 'ㅈㅅ', data: datadic.ywt, borderColor: '#a6e3a1', borderWidth: 1.5, tension: 0.2, pointRadius: 0 }, { label: '캬', data: datadic.yzi, borderColor: '#94e2d5', borderWidth: 1.5, tension: 0.2, pointRadius: 0 }, { label: 'ㄷㄷ/헉', data: datadic.yee, borderColor: '#fab387', borderWidth: 1.5, tension: 0.2, pointRadius: 0 }] },
            options: {
                indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: true, position: 'top', labels: { font: { size: defaultFontSize } } }, annotation: { annotations: highlightAnnotations, clip: false }, tooltip: { enabled: false } },
                scales: {
                    x: { position: 'top', title: { display: !isMobile, text: '채팅 횟수' }, grid: { color: 'rgba(108, 112, 134, 0.2)' }, suggestedMax: Math.max(...datadic.ymean) * (isMobile ? 1.4 : 1.2), ticks: { font: { size: defaultFontSize } } },
                    y: {
                        type: 'category', 
                        ticks: {
                            autoSkip: false,
                            callback: function(value, index) {
                                const sec = Math.round(datadic.x[value]);
                                const prevSec = value > 0 ? Math.round(datadic.x[value - 1]) : -1;
                                const currentMin = Math.floor(sec / 60);
                                const prevMin = prevSec >= 0 ? Math.floor(prevSec / 60) : -1;
                                if (currentMin !== prevMin) {
                                    const h = String(Math.floor(sec / 3600)).padStart(2, '0');
                                    const m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
                                    return [`${h}:${m}`, getActualTimeOnly(sec, initTime)];
                                }
                                return null;
                            },
                            color: '#a6adc8', font: { size: defaultFontSize }
                        },
                        grid: {
                            color: function(context) {
                                if (context.tick && context.tick.value !== undefined) {
                                    const sec = Math.round(datadic.x[context.tick.value]);
                                    const prevSec = context.tick.value > 0 ? Math.round(datadic.x[context.tick.value - 1]) : -1;
                                    if (Math.floor(sec / 60) !== (prevSec >= 0 ? Math.floor(prevSec / 60) : -1)) return 'rgba(108, 112, 134, 0.2)';
                                }
                                return 'transparent';
                            }
                        }
                    }
                }
            },
            plugins: [htmlTextOverlayPlugin]
        });

        const hourBtnContainer = document.getElementById('hourButtonContainer');
        hourBtnContainer.innerHTML = '';
        if (totalChunks > 1) {
            for (let i = 0; i < totalChunks; i++) {
                const btn = document.createElement('button');
                btn.className = 'hour-btn';
                const startH = i * chunkSize;
                const endH = Math.min((i + 1) * chunkSize, totalHours);
                btn.innerText = `${startH}~${endH}시간`;
                btn.dataset.chunk = i;
                btn.onclick = () => selectChunk(i);
                hourBtnContainer.appendChild(btn);
            }
        }
        selectChunk(0); 
    }

    const scrollTopBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => { scrollTopBtn.style.display = window.scrollY > 300 ? 'flex' : 'none'; });
    scrollTopBtn.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });
</script>

</body>
